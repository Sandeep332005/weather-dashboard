<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🌤️ Weather Dashboard</h1>
            <p>Get real-time weather information for any city</p>
        </header>

        <div class="search-section">
            <div class="search-box">
                <input type="text" id="cityInput" placeholder="Enter city name..." autocomplete="off">
                <button id="searchBtn" class="search-btn"><i class="fas fa-search"></i></button>
            </div>
            <div id="suggestions" class="suggestions"></div>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Loading weather data...</p>
        </div>

        <div id="currentWeather" class="current-weather hidden">
            <div class="weather-card">
                <div class="city-info">
                    <h2 id="cityName"></h2>
                    <p id="description"></p>
                </div>
                <div class="temperature-section">
                    <div class="temperature">
                        <span id="temp"></span>
                        <span class="unit">°C</span>
                    </div>
                    <div class="weather-icon">
                        <img id="weatherIcon" src="" alt="weather">
                    </div>
                </div>
                <div class="weather-details">
                    <div class="detail">
                        <i class="fas fa-droplets"></i>
                        <div><span>Humidity</span><p id="humidity"></p></div>
                    </div>
                    <div class="detail">
                        <i class="fas fa-wind"></i>
                        <div><span>Wind Speed</span><p id="windSpeed"></p></div>
                    </div>
                    <div class="detail">
                        <i class="fas fa-gauge"></i>
                        <div><span>Pressure</span><p id="pressure"></p></div>
                    </div>
                    <div class="detail">
                        <i class="fas fa-eye"></i>
                        <div><span>Visibility</span><p id="visibility"></p></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="forecastSection" class="forecast-section hidden">
            <h3>5-Day Forecast</h3>
            <div id="forecastContainer" class="forecast-container"></div>
        </div>

        <div class="saved-cities-section">
            <h3>Saved Cities</h3>
            <div id="savedCitiesList" class="saved-cities-list"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
